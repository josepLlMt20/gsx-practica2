services:
  nginx:
    build: ../docker/nginx
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - gsx-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  app:
    build: ../docker/app
    expose:
      - "8080"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-greendevcorp}
      - DB_USER=${DB_USER:-gsx}
      - DB_PASSWORD=${DB_PASSWORD:-gsx123}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gsx-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${DB_NAME:-greendevcorp}
      - POSTGRES_USER=${DB_USER:-gsx}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-gsx123}
    expose:
      - "5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - gsx-network
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gsx} -d ${DB_NAME:-greendevcorp}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  gsx-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data: