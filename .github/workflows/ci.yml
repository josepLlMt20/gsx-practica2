name: CI Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DOCKER_USER: josepllmt20

jobs:
  # Job 1: Validar Terraform
  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform

  # Job 2: Build, Scan i Push
  docker-build:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Determinar tags
      - name: Set image tags
        id: tags
        run: |
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)
          echo "sha_tag=$SHA_SHORT" >> $GITHUB_OUTPUT
          
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      # Build Nginx amb cache
      - name: Build Nginx
        uses: docker/build-push-action@v5
        with:
          context: ./docker/nginx
          load: true
          tags: ${{ env.DOCKER_USER }}/nginx-gsx:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build App
        uses: docker/build-push-action@v5
        with:
          context: ./docker/app
          load: true
          tags: ${{ env.DOCKER_USER }}/app-gsx:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max


      # Security Scan amb Trivy
      - name: Scan Nginx for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USER }}/nginx-gsx:scan
          format: 'table'
          exit-code: '1'

          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Scan App for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USER }}/app-gsx:scan
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      # Generar SBOM
      - name: Generate SBOM for Nginx
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USER }}/nginx-gsx:scan
          format: 'cyclonedx'
          output: 'nginx-sbom.json'

      - name: Generate SBOM for App
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_USER }}/app-gsx:scan
          format: 'cyclonedx'
          output: 'app-sbom.json'

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            nginx-sbom.json
            app-sbom.json

      # Push amb múltiples tags
      - name: Push Nginx
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v5
        with:
          context: ./docker/nginx
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/nginx-gsx:${{ steps.tags.outputs.sha_tag }}
            ${{ env.DOCKER_USER }}/nginx-gsx:latest
            ${{ steps.tags.outputs.is_release == 'true' && format('{0}/nginx-gsx:{1}', env.DOCKER_USER, steps.tags.outputs.version_tag) || '' }}
            ${{ steps.tags.outputs.is_release == 'true' && format('{0}/nginx-gsx:stable', env.DOCKER_USER) || '' }}
          cache-from: type=gha

      - name: Push App
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v5
        with:
          context: ./docker/app
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/app-gsx:${{ steps.tags.outputs.sha_tag }}
            ${{ env.DOCKER_USER }}/app-gsx:latest
            ${{ steps.tags.outputs.is_release == 'true' && format('{0}/app-gsx:{1}', env.DOCKER_USER, steps.tags.outputs.version_tag) || '' }}
            ${{ steps.tags.outputs.is_release == 'true' && format('{0}/app-gsx:stable', env.DOCKER_USER) || '' }}
          cache-from: type=gha

      # Summary
      - name: Summary
        run: |

          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit SHA:** ${{ steps.tags.outputs.sha_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Is Release:** ${{ steps.tags.outputs.is_release }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tags.outputs.is_release }}" == "true" ]; then
            echo "- **Version:** ${{ steps.tags.outputs.version_tag }}" >> $GITHUB_STEP_SUMMARY
          fi
